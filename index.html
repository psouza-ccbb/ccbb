<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PONG</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  background:#050508;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'Press Start 2P','Courier New',monospace;
  color:#00FF88;
  overflow:hidden;
  user-select:none;
}

/* CRT scanlines */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(
    0deg,transparent 0,transparent 2px,
    rgba(0,0,0,.10) 2px,rgba(0,0,0,.10) 4px
  );
  pointer-events:none;z-index:999;
}

/* CRT vignette */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at center,transparent 52%,rgba(0,0,0,.82) 100%);
  pointer-events:none;z-index:998;
}

#wrap{
  display:flex;flex-direction:column;
  align-items:center;gap:14px;
  position:relative;z-index:1;
}

h1{
  font-size:11px;letter-spacing:10px;
  text-shadow:0 0 8px #00FF88,0 0 24px #00FF8855;
  animation:flicker 6s infinite;
}
@keyframes flicker{
  0%,90%,92%,94%,100%{opacity:1}
  91%{opacity:.55}93%{opacity:.85}
}

#board{display:flex;align-items:center;gap:34px}

.sv{
  font-size:40px;min-width:54px;text-align:center;
  text-shadow:0 0 14px #00FF88,0 0 38px #00FF8855;
  transition:transform .08s;
}
.sv.bump{transform:scale(1.45)}
.sep{font-size:14px;opacity:.3}

.lbl{
  font-size:6px;letter-spacing:2px;
  opacity:.35;text-align:center;margin-top:4px;
}

#cw{position:relative;line-height:0}

canvas{
  display:block;
  border:1px solid rgba(0,255,136,.18);
  box-shadow:0 0 20px rgba(0,255,136,.07),0 0 60px rgba(0,255,136,.03);
}

#ov{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:22px;
  background:rgba(5,5,8,.68);
}
#ov.hidden{display:none}

#ov-t{
  font-size:18px;letter-spacing:5px;
  text-shadow:0 0 10px #00FF88,0 0 32px #00FF8866;
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.48}}

#ov-s{
  font-size:7px;letter-spacing:2.5px;
  opacity:.7;text-shadow:0 0 7px #00FF88;
}

#bar{display:flex;gap:12px}

.btn{
  background:transparent;
  border:1px solid rgba(0,255,136,.32);
  color:#00FF88;
  font-family:inherit;font-size:7px;
  padding:9px 14px;cursor:pointer;
  letter-spacing:1.5px;
  text-shadow:0 0 5px #00FF8877;
  transition:background .12s,box-shadow .12s;
}
.btn:hover{
  background:rgba(0,255,136,.09);
  box-shadow:0 0 10px rgba(0,255,136,.28);
  border-color:rgba(0,255,136,.55);
}
.btn:active{background:rgba(0,255,136,.18)}

#hint{
  font-size:6px;letter-spacing:2px;
  opacity:.30;text-align:center;line-height:2.5;
}
</style>
</head>
<body>

<div id="wrap">
  <h1>P O N G</h1>

  <div id="board">
    <div>
      <div class="sv" id="sp1">0</div>
      <div class="lbl" id="lbl1">J1</div>
    </div>
    <span class="sep">–</span>
    <div>
      <div class="sv" id="sp2">0</div>
      <div class="lbl" id="lbl2">CPU</div>
    </div>
  </div>

  <div id="cw">
    <canvas id="g" width="700" height="430"></canvas>
    <div id="ov">
      <div id="ov-t">PONG</div>
      <div id="ov-s">PRESSIONE ESPAÇO PARA INICIAR</div>
    </div>
  </div>

  <div id="bar">
    <button class="btn" id="bm" onclick="toggleMode()">MODO: 1P vs CPU</button>
    <button class="btn" onclick="togglePause()">PAUSA &nbsp;[P]</button>
  </div>

  <div id="hint">
    J1: W / S &nbsp;&nbsp;|&nbsp;&nbsp; J2: ↑ / ↓ &nbsp;&nbsp;|&nbsp;&nbsp; PRIMEIRO A 7 PONTOS VENCE
  </div>
</div>

<script>
'use strict';
const canvas = document.getElementById('g');
const ctx    = canvas.getContext('2d');
const W = 700, H = 430;

const PW = 10, PH = 84, BR = 7;
const PSPD = 6, AI_V = 5.0;
const ISPD = 4.8, MSPD = 13;
const WIN  = 7;
const CLR  = '#00FF88';

let mode   = 'ai';
let status = 'menu';
const keys = {};
let audioCtx = null;
let p1, p2, ball;

function init() {
  p1 = { x:18, y:H/2-PH/2, score:0 };
  p2 = { x:W-18-PW, y:H/2-PH/2, score:0 };
  resetBall(Math.random()<.5 ? 1 : -1);
  setScore('sp1',0); setScore('sp2',0);
}

function resetBall(d) {
  const a = Math.random()*.5-.25;
  ball = {
    x:W/2, y:H/2,
    vx:Math.cos(a)*ISPD*d,
    vy:Math.sin(a)*ISPD,
    trail:[]
  };
}

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function beep(f,d,w,v) {
  w=w||'square'; v=v||.10;
  if (!audioCtx) return;
  try {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type=w; o.frequency.value=f;
    g.gain.setValueAtTime(v,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+d);
    o.start(); o.stop(audioCtx.currentTime+d);
  } catch(_){}
}

document.addEventListener('keydown', e => {
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  if(e.key===' ') {
    ensureAudio();
    if(status==='menu')          { status='playing'; hideOv(); }
    else if(status==='gameover') { init(); status='playing'; hideOv(); }
    else if(status==='playing')  { status='paused'; showOv('PAUSADO','ESPAÇO PARA CONTINUAR'); }
    else if(status==='paused')   { status='playing'; hideOv(); }
  }
  if(e.key==='p'||e.key==='P') {
    if(status==='playing')     { status='paused'; showOv('PAUSADO','P PARA CONTINUAR'); }
    else if(status==='paused') { status='playing'; hideOv(); }
  }
});
document.addEventListener('keyup', e=>{ keys[e.key]=false; });

function showOv(t,s) {
  document.getElementById('ov').classList.remove('hidden');
  document.getElementById('ov-t').textContent=t;
  document.getElementById('ov-s').textContent=s;
}
function hideOv() { document.getElementById('ov').classList.add('hidden'); }

function setScore(id,v) {
  const el=document.getElementById(id);
  el.textContent=v;
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  setTimeout(()=>el.classList.remove('bump'),130);
}

function toggleMode() {
  ensureAudio();
  mode=(mode==='ai')?'2p':'ai';
  document.getElementById('bm').textContent =
    mode==='ai'?'MODO: 1P vs CPU':'MODO: 2 JOGADORES';
  document.getElementById('lbl2').textContent =
    mode==='ai'?'CPU':'J2';
  init(); status='menu';
  showOv('PONG','PRESSIONE ESPAÇO PARA INICIAR');
}

function togglePause() {
  ensureAudio();
  if(status==='playing')     { status='paused'; showOv('PAUSADO','P PARA CONTINUAR'); }
  else if(status==='paused') { status='playing'; hideOv(); }
}

function update() {
  if(status!=='playing') return;

  if(keys['w']||keys['W']) p1.y-=PSPD;
  if(keys['s']||keys['S']) p1.y+=PSPD;
  p1.y=clamp(p1.y,0,H-PH);

  if(mode==='2p') {
    if(keys['ArrowUp'])   p2.y-=PSPD;
    if(keys['ArrowDown']) p2.y+=PSPD;
  } else {
    const noise = Math.sin(Date.now()*.0007)*9;
    const diff  = (ball.y-PH/2+noise)-p2.y;
    p2.y += Math.sign(diff)*Math.min(Math.abs(diff),AI_V);
  }
  p2.y=clamp(p2.y,0,H-PH);

  ball.trail.push({x:ball.x,y:ball.y});
  if(ball.trail.length>10) ball.trail.shift();

  ball.x+=ball.vx;
  ball.y+=ball.vy;

  if(ball.y-BR<=0)  { ball.y=BR;   ball.vy= Math.abs(ball.vy); beep(340,.06); }
  if(ball.y+BR>=H)  { ball.y=H-BR; ball.vy=-Math.abs(ball.vy); beep(340,.06); }

  if( ball.vx<0 &&
      ball.x-BR<p1.x+PW && ball.x>p1.x &&
      ball.y+BR>p1.y    && ball.y-BR<p1.y+PH ) {
    ball.x=p1.x+PW+BR; bounce(p1,1); beep(520,.09);
  }

  if( ball.vx>0 &&
      ball.x+BR>p2.x     && ball.x<p2.x+PW &&
      ball.y+BR>p2.y     && ball.y-BR<p2.y+PH ) {
    ball.x=p2.x-BR; bounce(p2,-1); beep(520,.09);
  }

  if(ball.x < -BR-20) {
    p2.score++; setScore('sp2',p2.score);
    beep(160,.35,'sawtooth',.14);
    if(p2.score>=WIN) {
      status='gameover';
      showOv(mode==='ai'?'CPU VENCEU!':'JOGADOR 2 VENCEU!','ESPAÇO PARA JOGAR DE NOVO');
    } else resetBall(-1);
  }

  if(ball.x > W+BR+20) {
    p1.score++; setScore('sp1',p1.score);
    beep(160,.35,'sawtooth',.14);
    if(p1.score>=WIN) {
      status='gameover';
      showOv('JOGADOR 1 VENCEU!','ESPAÇO PARA JOGAR DE NOVO');
    } else resetBall(1);
  }
}

function bounce(pad,dir) {
  const rel = (ball.y-(pad.y+PH/2))/(PH/2);
  const ang = rel*(Math.PI/3);
  const spd = clamp(Math.hypot(ball.vx,ball.vy)*1.055,ISPD,MSPD);
  ball.vx=Math.cos(ang)*spd*dir;
  ball.vy=Math.sin(ang)*spd;
}

function clamp(v,lo,hi){ return v<lo?lo:v>hi?hi:v; }

function draw() {
  ctx.fillStyle='#050508';
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.setLineDash([7,10]);
  ctx.strokeStyle='rgba(0,255,136,.13)';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.restore();

  if(status==='menu') return;

  ball.trail.forEach((t,i)=>{
    const p=i/ball.trail.length;
    ctx.beginPath();
    ctx.arc(t.x,t.y,BR*(0.22+p*.78),0,Math.PI*2);
    ctx.fillStyle=`rgba(0,255,136,${p*.26})`;
    ctx.fill();
  });

  ctx.save();
  ctx.shadowBlur=22; ctx.shadowColor=CLR;
  ctx.fillStyle=CLR;
  ctx.beginPath(); ctx.arc(ball.x,ball.y,BR,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.shadowBlur=14; ctx.shadowColor=CLR;
  ctx.fillStyle=CLR;
  rr(p1.x,p1.y,PW,PH,4);
  rr(p2.x,p2.y,PW,PH,4);
  ctx.restore();
}

function rr(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,   x+w,y+r,   r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,   x,y+h-r,   r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,     x+r,y,     r);
  ctx.closePath(); ctx.fill();
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

init();
loop();
</script>
</body>
</html>
